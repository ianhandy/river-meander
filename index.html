<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>River Meander</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0d1117;
    color: #c9d1d9;
    font-family: 'SF Mono', 'Fira Code', monospace;
    display: flex;
    flex-direction: column;
    align-items: center;
    height: 100vh;
    overflow: hidden;
  }
  canvas {
    display: block;
    cursor: crosshair;
  }
  #ui {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    display: flex;
    align-items: center;
    gap: 20px;
    padding: 12px 24px;
    background: rgba(13,17,23,0.85);
    backdrop-filter: blur(8px);
    border-top: 1px solid #21262d;
    flex-wrap: wrap;
  }
  #year-display {
    font-size: 13px;
    color: #6e7681;
    min-width: 120px;
  }
  #year-display span {
    color: #58a6ff;
    font-weight: 600;
  }
  .control-group {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  label {
    font-size: 11px;
    color: #6e7681;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    white-space: nowrap;
  }
  button {
    background: #21262d;
    color: #c9d1d9;
    border: 1px solid #30363d;
    padding: 5px 14px;
    border-radius: 6px;
    font-size: 12px;
    font-family: inherit;
    cursor: pointer;
    transition: background 0.15s;
  }
  button:hover { background: #30363d; }
  button.active {
    background: #1f6feb;
    border-color: #388bfd;
    color: #fff;
  }
  input[type=range] {
    -webkit-appearance: none;
    width: 90px;
    height: 4px;
    background: #21262d;
    border-radius: 2px;
    outline: none;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 12px;
    height: 12px;
    background: #58a6ff;
    border-radius: 50%;
    cursor: pointer;
  }
  #oxbow-count {
    font-size: 11px;
    color: #6e7681;
    margin-left: auto;
  }
  #oxbow-count span { color: #3fb950; font-weight: 600; }
</style>
</head>
<body>
<canvas id="c"></canvas>

<div id="ui">
  <div id="year-display">Year <span id="yr">0</span></div>

  <div class="control-group">
    <button id="btn-play" class="active" onclick="togglePlay()">⏸ Pause</button>
    <button onclick="reset()">↺ Reset</button>
  </div>

  <div class="control-group">
    <label>Speed</label>
    <input type="range" id="speed" min="1" max="100" value="20">
  </div>

  <div class="control-group">
    <label>Erodibility</label>
    <input type="range" id="erodibility" min="1" max="100" value="30">
  </div>

  <div class="control-group">
    <label>Sinuosity</label>
    <input type="range" id="sinuosity" min="1" max="100" value="40">
  </div>

  <div id="oxbow-count">Oxbow lakes: <span id="oxbow-n">0</span></div>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

// ── Simulation state ────────────────────────────────────────────────────────
let nodes = [];        // [{x, y}]  centerline nodes
let oxbows = [];       // [{pts: [{x,y}], age: 0}]  cutoff loops
let year = 0;
let running = true;
let animFrame = null;

// ── Parameters ───────────────────────────────────────────────────────────────
const W = 18;          // channel width (pixels, reference)
const DS = W * 0.6;    // target arc-length spacing between nodes
const MIN_NODES = 5;   // minimum nodes to keep working
const CUTOFF_DIST = W * 0.85;  // neck cutoff trigger distance

function getE()  { return (document.getElementById('erodibility').value / 100) * 4e-3; }
function getSpd(){ return document.getElementById('speed').value / 100; }
function getOmega() { return 1.5; } // upstream decay rate

// ── Initialization ───────────────────────────────────────────────────────────
function makeInitialChannel() {
  const W2 = canvas.width, H2 = canvas.height - 60;
  const sin = document.getElementById('sinuosity').value / 100;
  nodes = [];
  const n = 120;
  for (let i = 0; i <= n; i++) {
    const t = i / n;
    const x = W2 * 0.05 + t * W2 * 0.9;
    // gentle sine with amplitude scaling from sinuosity slider
    const amp = sin * H2 * 0.28;
    const y = H2 / 2 + Math.sin(t * Math.PI * 3.5) * amp
                      + Math.sin(t * Math.PI * 1.3) * amp * 0.4;
    nodes.push({ x, y });
  }
  oxbows = [];
  year = 0;
  document.getElementById('yr').textContent = '0';
  document.getElementById('oxbow-n').textContent = '0';
}

function reset() {
  makeInitialChannel();
}

// ── Math helpers ─────────────────────────────────────────────────────────────
function arcLen(a, b) {
  const dx = b.x - a.x, dy = b.y - a.y;
  return Math.sqrt(dx * dx + dy * dy);
}

// Curvature via finite differences (central)
function curvature(pts) {
  const n = pts.length;
  const C = new Float64Array(n);
  for (let i = 1; i < n - 1; i++) {
    const dx1 = pts[i].x - pts[i-1].x, dy1 = pts[i].y - pts[i-1].y;
    const dx2 = pts[i+1].x - pts[i].x, dy2 = pts[i+1].y - pts[i].y;
    // cross product / magnitude^3  (signed curvature)
    const num = dx1 * dy2 - dy1 * dx2;
    const den = Math.pow(dx1*dx1 + dy1*dy1, 0.75); // ~|ds|^1.5
    C[i] = den > 1e-10 ? num / den : 0;
  }
  C[0] = C[1];
  C[n-1] = C[n-2];
  return C;
}

// Unit normals (pointing left of travel direction)
function normals(pts) {
  const n = pts.length;
  const N = [];
  for (let i = 0; i < n; i++) {
    let dx, dy;
    if (i === 0) {
      dx = pts[1].x - pts[0].x; dy = pts[1].y - pts[0].y;
    } else if (i === n - 1) {
      dx = pts[n-1].x - pts[n-2].x; dy = pts[n-1].y - pts[n-2].y;
    } else {
      dx = pts[i+1].x - pts[i-1].x; dy = pts[i+1].y - pts[i-1].y;
    }
    const len = Math.sqrt(dx*dx + dy*dy) || 1;
    N.push({ x: -dy / len, y: dx / len });
  }
  return N;
}

// Resample to uniform arc-length spacing
function resample(pts, ds) {
  const out = [{ x: pts[0].x, y: pts[0].y }];
  let acc = 0;
  for (let i = 1; i < pts.length; i++) {
    let rem = arcLen(pts[i-1], pts[i]);
    let px = pts[i-1].x, py = pts[i-1].y;
    const dx = pts[i].x - pts[i-1].x, dy = pts[i].y - pts[i-1].y;
    const seg = Math.sqrt(dx*dx + dy*dy) || 1;
    const ux = dx / seg, uy = dy / seg;
    while (acc + rem >= ds) {
      const step = ds - acc;
      px += ux * step; py += uy * step;
      out.push({ x: px, y: py });
      rem -= step; acc = 0;
    }
    acc += rem;
  }
  // always include last point
  const last = pts[pts.length - 1];
  if (arcLen(out[out.length-1], last) > ds * 0.1)
    out.push({ x: last.x, y: last.y });
  return out;
}

// ── Physics step (Howard & Knutson 1984) ─────────────────────────────────────
function step(dt) {
  const n = nodes.length;
  if (n < 4) return;

  const E = getE();
  const Omega = getOmega();

  const C = curvature(nodes);
  const N = normals(nodes);

  // Upstream-weighted curvature convolution → near-bank velocity perturbation
  const ub = new Float64Array(n);
  for (let i = 0; i < n; i++) {
    let sum = 0;
    for (let j = 0; j <= i; j++) {
      sum += C[j] * Math.exp(-Omega * (i - j) * DS / W);
    }
    ub[i] = sum * DS / W;
  }

  // Migrate nodes normal to centerline
  for (let i = 1; i < n - 1; i++) {
    const disp = E * ub[i] * dt;
    nodes[i] = { x: nodes[i].x + disp * N[i].x, y: nodes[i].y + disp * N[i].y };
  }

  // Resample to keep uniform spacing
  nodes = resample(nodes, DS);

  // Age oxbows
  for (const o of oxbows) o.age += dt;
}

// ── Cutoff detection ──────────────────────────────────────────────────────────
function checkCutoffs() {
  const n = nodes.length;
  const MIN_SKIP = Math.max(8, Math.floor(W * 3 / DS));

  for (let i = 0; i < n; i++) {
    for (let j = i + MIN_SKIP; j < n; j++) {
      const dx = nodes[j].x - nodes[i].x;
      const dy = nodes[j].y - nodes[i].y;
      if (dx*dx + dy*dy < CUTOFF_DIST * CUTOFF_DIST) {
        // Save the excised loop as an oxbow
        const loop = nodes.slice(i, j + 1);
        if (loop.length > 3) {
          oxbows.push({ pts: loop, age: 0 });
          document.getElementById('oxbow-n').textContent = oxbows.length;
        }
        // Reconnect: keep 0..i then j..end
        nodes = [...nodes.slice(0, i + 1), ...nodes.slice(j)];
        return; // one cutoff per step to avoid cascade
      }
    }
  }
}

// ── Rendering ────────────────────────────────────────────────────────────────
function buildRiverPolygon(pts, halfW) {
  const N = normals(pts);
  const left = pts.map((p, i) => ({ x: p.x + halfW * N[i].x, y: p.y + halfW * N[i].y }));
  const right = pts.map((p, i) => ({ x: p.x - halfW * N[i].x, y: p.y - halfW * N[i].y }));
  return [...left, ...[...right].reverse()];
}

function drawPoly(poly, fillColor, strokeColor, lineWidth = 0) {
  if (poly.length < 2) return;
  ctx.beginPath();
  ctx.moveTo(poly[0].x, poly[0].y);
  for (let i = 1; i < poly.length; i++) ctx.lineTo(poly[i].x, poly[i].y);
  ctx.closePath();
  if (fillColor) { ctx.fillStyle = fillColor; ctx.fill(); }
  if (strokeColor) { ctx.strokeStyle = strokeColor; ctx.lineWidth = lineWidth; ctx.stroke(); }
}

function drawRiverLine(pts, color, width) {
  if (pts.length < 2) return;
  ctx.beginPath();
  ctx.moveTo(pts[0].x, pts[0].y);
  for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i].x, pts[i].y);
  ctx.strokeStyle = color;
  ctx.lineWidth = width;
  ctx.lineJoin = 'round';
  ctx.lineCap = 'round';
  ctx.stroke();
}

function draw() {
  const W2 = canvas.width, H2 = canvas.height;
  ctx.clearRect(0, 0, W2, H2);

  // Background — floodplain
  ctx.fillStyle = '#0d1117';
  ctx.fillRect(0, 0, W2, H2);

  // Subtle terrain texture
  ctx.fillStyle = 'rgba(34,52,34,0.18)';
  ctx.fillRect(0, 0, W2, H2 - 60);

  // Oxbow lakes
  for (const o of oxbows) {
    const fade = Math.min(1, 1 - o.age / 15000);
    const alpha = 0.15 + fade * 0.45;
    const poly = buildRiverPolygon(o.pts, W * 0.55);
    drawPoly(poly, `rgba(30,90,140,${alpha})`, null);
    // Centerline of oxbow (fades out)
    if (fade > 0.1) drawRiverLine(o.pts, `rgba(58,140,190,${fade * 0.4})`, 1);
  }

  // River body
  const poly = buildRiverPolygon(nodes, W * 0.5);
  drawPoly(poly, null, null);

  // River fill — deep blue water
  if (poly.length > 2) {
    ctx.beginPath();
    ctx.moveTo(poly[0].x, poly[0].y);
    for (let i = 1; i < poly.length; i++) ctx.lineTo(poly[i].x, poly[i].y);
    ctx.closePath();

    // Gradient across river width
    const mid = nodes[Math.floor(nodes.length / 2)];
    const grad = ctx.createRadialGradient(mid.x, mid.y, 0, mid.x, mid.y, canvas.width * 0.5);
    grad.addColorStop(0, 'rgba(35,110,185,0.95)');
    grad.addColorStop(1, 'rgba(20,70,130,0.95)');
    ctx.fillStyle = grad;
    ctx.fill();

    // Edge highlight
    ctx.strokeStyle = 'rgba(90,180,240,0.5)';
    ctx.lineWidth = 1;
    ctx.stroke();
  }

  // Centerline (faint)
  drawRiverLine(nodes, 'rgba(120,200,255,0.12)', 1);

  // Year counter
  document.getElementById('yr').textContent = Math.round(year).toLocaleString();
}

// ── Main loop ────────────────────────────────────────────────────────────────
let lastTime = null;
const DT_PER_FRAME = 50; // simulated years per logical step

function loop(ts) {
  animFrame = requestAnimationFrame(loop);
  if (!running) { lastTime = null; return; }

  const spd = getSpd();
  const steps = Math.max(1, Math.round(spd * 8));

  for (let s = 0; s < steps; s++) {
    step(DT_PER_FRAME);
    checkCutoffs();
    year += DT_PER_FRAME;
  }

  draw();
}

function togglePlay() {
  running = !running;
  const btn = document.getElementById('btn-play');
  btn.textContent = running ? '⏸ Pause' : '▶ Play';
  btn.classList.toggle('active', running);
}

// ── Resize ───────────────────────────────────────────────────────────────────
function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  makeInitialChannel();
  draw();
}

window.addEventListener('resize', resize);
resize();
requestAnimationFrame(loop);
</script>
</body>
</html>
