<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>River Meander</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0d1117;
    color: #c9d1d9;
    font-family: 'SF Mono', 'Fira Code', monospace;
    display: flex;
    flex-direction: column;
    align-items: center;
    height: 100vh;
    overflow: hidden;
  }
  canvas { display: block; cursor: crosshair; }
  #ui {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    display: flex;
    align-items: center;
    gap: 18px;
    padding: 10px 20px;
    background: rgba(13,17,23,0.9);
    backdrop-filter: blur(10px);
    border-top: 1px solid #21262d;
    flex-wrap: wrap;
    z-index: 10;
  }
  .stat { font-size: 11px; color: #6e7681; min-width: 100px; }
  .stat span { color: #58a6ff; font-weight: 600; }
  .group { display: flex; align-items: center; gap: 7px; }
  label { font-size: 10px; color: #6e7681; text-transform: uppercase; letter-spacing:.05em; white-space:nowrap; }
  button {
    background: #21262d; color: #c9d1d9;
    border: 1px solid #30363d;
    padding: 4px 12px; border-radius: 5px;
    font-size: 11px; font-family: inherit; cursor: pointer;
    transition: background .12s;
  }
  button:hover { background: #30363d; }
  button.active { background: #1f6feb; border-color: #388bfd; color: #fff; }
  input[type=range] {
    -webkit-appearance: none;
    width: 80px; height: 3px;
    background: #21262d; border-radius: 2px; outline: none;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 11px; height: 11px;
    background: #58a6ff; border-radius: 50%; cursor: pointer;
  }
  #legend {
    position: fixed; top: 12px; right: 14px;
    background: rgba(13,17,23,0.75);
    border: 1px solid #21262d;
    border-radius: 6px;
    padding: 8px 12px;
    font-size: 10px;
    line-height: 1.8;
    color: #6e7681;
    pointer-events: none;
  }
  .lrow { display: flex; align-items: center; gap: 6px; }
  .lswatch { width: 14px; height: 8px; border-radius: 2px; flex-shrink: 0; }
  #hint {
    position: fixed; top: 12px; left: 14px;
    font-size: 10px; color: #444d56;
    pointer-events: none;
    line-height: 1.7;
  }
</style>
</head>
<body>
<canvas id="c"></canvas>

<div id="ui">
  <div class="stat">Year <span id="yr">0</span></div>

  <div class="group">
    <button id="btn-play" class="active" onclick="togglePlay()">⏸ Pause</button>
    <button onclick="initSim()">↺ Reset</button>
  </div>

  <div class="group">
    <label>Speed</label>
    <input type="range" id="speed" min="1" max="60" value="15">
  </div>

  <div class="group">
    <label>Erodibility</label>
    <input type="range" id="erodibility" min="1" max="100" value="35">
  </div>

  <div class="group">
    <label>Hardness Depth</label>
    <input type="range" id="hardness-depth" min="1" max="100" value="50">
  </div>

  <div class="group">
    <label>Flow Rate</label>
    <input type="range" id="flow-rate" min="1" max="100" value="40">
  </div>

  <div class="group">
    <label>Layers</label>
    <button id="btn-layers" class="active" onclick="toggleLayers()">ON</button>
    <label>Pressure</label>
    <button id="btn-pressure" onclick="togglePressure()">OFF</button>
    <label>Velocity</label>
    <button id="btn-velocity" onclick="toggleVelocity()">OFF</button>
  </div>

  <div class="stat" style="margin-left:auto">
    Oxbows <span id="oxbow-n">0</span> &nbsp;|&nbsp;
    Max depth <span id="max-depth">0.0</span>m
  </div>
</div>

<div id="legend">
  <div class="lrow"><div class="lswatch" style="background:#c8b89a"></div> Alluvium (soft)</div>
  <div class="lrow"><div class="lswatch" style="background:#b07a50"></div> Clay / silt</div>
  <div class="lrow"><div class="lswatch" style="background:#8a6040"></div> Sandstone</div>
  <div class="lrow"><div class="lswatch" style="background:#607060"></div> Limestone</div>
  <div class="lrow"><div class="lswatch" style="background:#485060"></div> Bedrock (hard)</div>
  <div class="lrow"><div class="lswatch" style="background:rgba(40,100,200,0.8)"></div> Water</div>
</div>

<div id="hint">
  Click — add water source<br>
  Shift+click — add obstruction
</div>

<script>
// ═══════════════════════════════════════════════════════════════════
// CONSTANTS
// ═══════════════════════════════════════════════════════════════════
const CELL_PX   = 3;          // pixels per grid cell
const UI_H      = 46;         // UI bar height
const GRAVITY   = 6.0;        // hydraulic gravity constant (tuned)
const EVAP      = 0.00015;    // evaporation rate
const Kc        = 0.18;       // sediment capacity coefficient
const Ks_base   = 0.008;      // base erosion rate
const Kd        = 0.015;      // deposition rate
const Kt        = 0.003;      // thermal erosion (slope softening)
const MIN_WATER = 1e-4;       // water depth threshold
const DT        = 0.35;       // hydraulic timestep per sub-step
const YEARS_PER_STEP = 40;    // simulated years per physics step

// Hardness layer thresholds (fraction of original elevation)
// Surface ← soft alluvium; depth ← hard bedrock
const LAYERS = [
  { depth: 0.00, hardness: 1.0,  r:200, g:184, b:154 },  // alluvium
  { depth: 0.04, hardness: 2.2,  r:176, g:122, b: 80 },  // clay
  { depth: 0.10, hardness: 4.0,  r:138, g: 96, b: 64 },  // sandstone
  { depth: 0.18, hardness: 7.5,  r: 96, g:112, b: 96 },  // limestone
  { depth: 0.28, hardness: 14.0, r: 72, g: 80, b: 96 },  // bedrock
];

// ═══════════════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════════════
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');

let GW, GH;                  // grid dimensions
let terrain, origTerrain;    // Float32 elevation [0..1]
let water;                   // Float32 water depth
let sediment;                // Float32 suspended sediment
let hardness;                // Float32 local hardness (dynamic)
let fluxL, fluxR, fluxU, fluxD; // Float32 pipe flux arrays

let sources  = [];           // [{gx, gy, rate}] continuous water inputs
let oxbows   = [];           // [{pts:[{x,y}], age}]
let year     = 0;
let running  = true;
let showLayers   = true;
let showPressure = false;
let showVelocity = false;

let imgTerrain, imgWater;    // ImageData buffers

// ═══════════════════════════════════════════════════════════════════
// VALUE NOISE  (multi-octave, no external deps)
// ═══════════════════════════════════════════════════════════════════
function makeNoise(seed) {
  let s = seed || 12345;
  return function lcg() {
    s = (s * 1664525 + 1013904223) & 0xffffffff;
    return (s >>> 0) / 0xffffffff;
  };
}

function buildNoiseGrid(w, h, rng) {
  const a = new Float32Array(w * h);
  for (let i = 0; i < a.length; i++) a[i] = rng();
  return a;
}

function sampleNoise(ng, nw, nh, fx, fy) {
  // bilinear interpolation
  fx = ((fx % 1) + 1) % 1;
  fy = ((fy % 1) + 1) % 1;
  const ix = Math.floor(fx * (nw - 1));
  const iy = Math.floor(fy * (nh - 1));
  const tx = fx * (nw - 1) - ix;
  const ty = fy * (nh - 1) - iy;
  const ix2 = Math.min(ix + 1, nw - 1);
  const iy2 = Math.min(iy + 1, nh - 1);
  const v00 = ng[iy  * nw + ix];
  const v10 = ng[iy  * nw + ix2];
  const v01 = ng[iy2 * nw + ix];
  const v11 = ng[iy2 * nw + ix2];
  const tx2 = tx * tx * (3 - 2 * tx); // smoothstep
  const ty2 = ty * ty * (3 - 2 * ty);
  return v00 + (v10 - v00) * tx2 + (v01 - v00) * ty2 + (v11 - v10 - v01 + v00) * tx2 * ty2;
}

function fbm(ngs, nlens, x, y, octaves) {
  let v = 0, amp = 0.5, freq = 1, max = 0;
  for (let o = 0; o < octaves; o++) {
    const ng = ngs[o], nl = nlens[o];
    v += sampleNoise(ng, nl, nl, x * freq, y * freq) * amp;
    max += amp;
    amp *= 0.5; freq *= 2.1;
  }
  return v / max;
}

// ═══════════════════════════════════════════════════════════════════
// TERRAIN GENERATION
// ═══════════════════════════════════════════════════════════════════
function generateTerrain() {
  const rng = makeNoise(Date.now() & 0xffff);
  const octaves = 6;
  const ngs = [], nlens = [];
  for (let o = 0; o < octaves; o++) {
    const nl = 4 + o * 3;
    ngs.push(buildNoiseGrid(nl, nl, rng));
    nlens.push(nl);
  }

  const t = new Float32Array(GW * GH);
  const aspect = GW / GH;

  for (let y = 0; y < GH; y++) {
    for (let x = 0; x < GW; x++) {
      const fx = x / GW;
      const fy = y / GH;

      // Base elevation
      let h = fbm(ngs, nlens, fx * aspect, fy, octaves);

      // Tilt: higher on left (upstream), lower on right (outlet)
      h += (1 - fx) * 0.35;

      // Valley bias: depression along horizontal midline → encourages central channel
      const dy = (fy - 0.5);
      h -= Math.exp(-dy * dy * 14) * 0.18;

      // Clamp and normalize
      t[y * GW + x] = Math.max(0, Math.min(1, h));
    }
  }

  // Normalize to [0.15, 0.95]
  let mn = 1, mx = 0;
  for (let i = 0; i < t.length; i++) { mn = Math.min(mn, t[i]); mx = Math.max(mx, t[i]); }
  const range = mx - mn;
  for (let i = 0; i < t.length; i++) t[i] = 0.15 + (t[i] - mn) / range * 0.80;

  return t;
}

// ═══════════════════════════════════════════════════════════════════
// HARDNESS  (function of original elevation + depth of cut)
// ═══════════════════════════════════════════════════════════════════
function getHardness(i) {
  // How deep has this cell been eroded below its original surface?
  const depthFraction = Math.max(0, origTerrain[i] - terrain[i]);
  // Find which layer we're in
  for (let l = LAYERS.length - 1; l >= 0; l--) {
    if (depthFraction >= LAYERS[l].depth) {
      return LAYERS[l].hardness;
    }
  }
  return LAYERS[0].hardness;
}

function layerColor(i) {
  const depthFraction = Math.max(0, origTerrain[i] - terrain[i]);
  for (let l = LAYERS.length - 1; l >= 0; l--) {
    if (depthFraction >= LAYERS[l].depth) return LAYERS[l];
  }
  return LAYERS[0];
}

// ═══════════════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════════════
function initSim() {
  GW = Math.floor(canvas.width  / CELL_PX);
  GH = Math.floor((canvas.height - UI_H) / CELL_PX);
  const N = GW * GH;

  terrain     = generateTerrain();
  origTerrain = terrain.slice();
  water       = new Float32Array(N);
  sediment    = new Float32Array(N);
  hardness    = new Float32Array(N);
  fluxL = new Float32Array(N);
  fluxR = new Float32Array(N);
  fluxU = new Float32Array(N);
  fluxD = new Float32Array(N);

  for (let i = 0; i < N; i++) hardness[i] = getHardness(i);

  imgTerrain = ctx.createImageData(GW, GH);
  imgWater   = ctx.createImageData(GW, GH);

  // Default water source: find lowest point on left edge (upstream inlet)
  let minH = Infinity, srcY = Math.floor(GH / 2);
  for (let y = GH * 0.2 | 0; y < GH * 0.8 | 0; y++) {
    if (terrain[y * GW] < minH) { minH = terrain[y * GW]; srcY = y; }
  }
  sources = [{ gx: 0, gy: srcY, rate: 0.08 }];

  year = 0;
  oxbows = [];
  document.getElementById('yr').textContent = '0';
  document.getElementById('oxbow-n').textContent = '0';
  document.getElementById('max-depth').textContent = '0.0';
}

// ═══════════════════════════════════════════════════════════════════
// HYDRAULIC STEP  (virtual pipe model, Müller et al. 2008)
// ═══════════════════════════════════════════════════════════════════
function stepHydraulic() {
  const dt = DT;
  const g  = GRAVITY;
  const N  = GW * GH;

  // Add water at sources
  const flowRate = document.getElementById('flow-rate').value / 100;
  for (const src of sources) {
    // spray across a small band around the source
    for (let dy = -2; dy <= 2; dy++) {
      const gy = src.gy + dy;
      if (gy < 0 || gy >= GH) continue;
      water[gy * GW + Math.max(0, src.gx)] += src.rate * flowRate * 0.6;
    }
  }

  // ── Pass 1: update outflow fluxes ────────────────────────────────
  for (let y = 0; y < GH; y++) {
    for (let x = 0; x < GW; x++) {
      const i = y * GW + x;
      const h = terrain[i] + water[i];  // water surface elevation

      // Right
      if (x < GW - 1) {
        const j = i + 1;
        const dh = h - terrain[j] - water[j];
        fluxR[i] = Math.max(0, fluxR[i] + dt * g * dh);
      } else { fluxR[i] = 0; }

      // Left
      if (x > 0) {
        const j = i - 1;
        const dh = h - terrain[j] - water[j];
        fluxL[i] = Math.max(0, fluxL[i] + dt * g * dh);
      } else { fluxL[i] = 0; }

      // Down
      if (y < GH - 1) {
        const j = i + GW;
        const dh = h - terrain[j] - water[j];
        fluxD[i] = Math.max(0, fluxD[i] + dt * g * dh);
      } else { fluxD[i] = 0; }

      // Up
      if (y > 0) {
        const j = i - GW;
        const dh = h - terrain[j] - water[j];
        fluxU[i] = Math.max(0, fluxU[i] + dt * g * dh);
      } else { fluxU[i] = 0; }

      // Scale fluxes so we don't drain more than available
      const totalOut = (fluxL[i] + fluxR[i] + fluxU[i] + fluxD[i]) * dt;
      if (totalOut > water[i] + MIN_WATER) {
        const scale = (water[i] + MIN_WATER) / totalOut;
        fluxL[i] *= scale; fluxR[i] *= scale;
        fluxU[i] *= scale; fluxD[i] *= scale;
      }
    }
  }

  // ── Pass 2: update water depth ───────────────────────────────────
  let maxDepth = 0;
  for (let y = 0; y < GH; y++) {
    for (let x = 0; x < GW; x++) {
      const i = y * GW + x;

      const inR = x > 0      ? fluxR[i - 1]  : 0;
      const inL = x < GW - 1 ? fluxL[i + 1]  : 0;
      const inD = y > 0      ? fluxD[i - GW]  : 0;
      const inU = y < GH - 1 ? fluxU[i + GW]  : 0;

      const net = (inR + inL + inD + inU - fluxL[i] - fluxR[i] - fluxU[i] - fluxD[i]) * dt;
      water[i] = Math.max(0, water[i] + net);

      // Evaporation
      water[i] *= (1 - EVAP);

      // Drain at right edge (outlet)
      if (x === GW - 1) water[i] *= 0.85;

      if (water[i] > maxDepth) maxDepth = water[i];
    }
  }

  return maxDepth;
}

// ═══════════════════════════════════════════════════════════════════
// EROSION / DEPOSITION  (capacity-based sediment transport)
// ═══════════════════════════════════════════════════════════════════
function stepErosion() {
  const erodSlider = document.getElementById('erodibility').value / 100;
  const hardDepth  = document.getElementById('hardness-depth').value / 100;

  for (let y = 1; y < GH - 1; y++) {
    for (let x = 1; x < GW - 1; x++) {
      const i = y * GW + x;
      if (water[i] < MIN_WATER) continue;

      // Velocity from flux differentials
      const vx = ((fluxR[x > 0 ? i - 1 : i] - fluxL[i]) + (fluxR[i] - fluxL[x < GW-1 ? i + 1 : i])) * 0.5;
      const vy = ((fluxD[y > 0 ? i - GW : i] - fluxU[i]) + (fluxD[i] - fluxU[y < GH-1 ? i + GW : i])) * 0.5;
      const speed2 = vx * vx + vy * vy;
      const speed  = Math.sqrt(speed2);

      // Layer hardness at current depth
      const depthCut = Math.max(0, origTerrain[i] - terrain[i]);
      let localH = LAYERS[0].hardness;
      for (let l = LAYERS.length - 1; l >= 0; l--) {
        if (depthCut >= LAYERS[l].depth * hardDepth * 1.5) {
          localH = LAYERS[l].hardness;
          break;
        }
      }

      const Ks_eff = Ks_base * erodSlider / localH;

      // Equilibrium sediment capacity
      const C_eq = Kc * speed * Math.sqrt(water[i]);

      if (C_eq > sediment[i]) {
        // Erode
        const delta = Math.min(Ks_eff * (C_eq - sediment[i]), 0.002);
        terrain[i]  -= delta;
        sediment[i] += delta;
      } else {
        // Deposit
        const delta = Kd * (sediment[i] - C_eq);
        terrain[i]  += delta;
        sediment[i] = Math.max(0, sediment[i] - delta);
      }

      // Thermal erosion: smooth steep slopes slightly
      const h = terrain[i];
      const neighbors = [
        terrain[i - 1], terrain[i + 1],
        terrain[i - GW], terrain[i + GW]
      ];
      let tSum = 0;
      for (const hn of neighbors) tSum += (hn - h);
      terrain[i] += Kt * tSum * 0.25;

      // Clamp
      terrain[i] = Math.max(0.01, terrain[i]);
    }
  }

  // Simple sediment advection: move sediment toward neighbors with outflow
  const tmpSed = sediment.slice();
  for (let y = 1; y < GH - 1; y++) {
    for (let x = 1; x < GW - 1; x++) {
      const i = y * GW + x;
      if (sediment[i] < 1e-5 || water[i] < MIN_WATER) continue;
      const totalOut = fluxL[i] + fluxR[i] + fluxU[i] + fluxD[i];
      if (totalOut < 1e-8) continue;
      const moved = Math.min(sediment[i] * 0.4, sediment[i]);
      if (fluxR[i] > 0 && x < GW - 1) { tmpSed[i + 1]  += moved * fluxR[i] / totalOut; }
      if (fluxL[i] > 0 && x > 0)       { tmpSed[i - 1]  += moved * fluxL[i] / totalOut; }
      if (fluxD[i] > 0 && y < GH - 1) { tmpSed[i + GW] += moved * fluxD[i] / totalOut; }
      if (fluxU[i] > 0 && y > 0)       { tmpSed[i - GW] += moved * fluxU[i] / totalOut; }
      tmpSed[i] -= moved;
    }
  }
  sediment.set(tmpSed);
}

// ═══════════════════════════════════════════════════════════════════
// RENDERING
// ═══════════════════════════════════════════════════════════════════

// Elevation-based terrain color (no water)
function terrainColor(i) {
  if (showLayers) {
    const lc = layerColor(i);
    // Shade by elevation within the layer
    const e = terrain[i];
    const shade = 0.75 + e * 0.45;
    return [lc.r * shade | 0, lc.g * shade | 0, lc.b * shade | 0];
  } else {
    // Satellite-style gradient
    const e = terrain[i];
    if (e < 0.25) {
      // Lowland: sandy
      const t = e / 0.25;
      return [lerp(180,200,t)|0, lerp(160,184,t)|0, lerp(100,130,t)|0];
    } else if (e < 0.55) {
      const t = (e - 0.25) / 0.30;
      return [lerp(100,130,t)|0, lerp(140,160,t)|0, lerp(70,90,t)|0];
    } else if (e < 0.75) {
      const t = (e - 0.55) / 0.20;
      return [lerp(130,160,t)|0, lerp(110,100,t)|0, lerp(60,60,t)|0];
    } else {
      const t = Math.min(1, (e - 0.75) / 0.25);
      return [lerp(160,230,t)|0, lerp(100,220,t)|0, lerp(60,220,t)|0];
    }
  }
}

function lerp(a, b, t) { return a + (b - a) * t; }

function renderTerrain() {
  const d = imgTerrain.data;
  for (let i = 0; i < GW * GH; i++) {
    const [r, g, b] = terrainColor(i);
    const p = i * 4;
    d[p]   = r;
    d[p+1] = g;
    d[p+2] = b;
    d[p+3] = 255;
  }

  // Contour lines: scan horizontally, mark cells where elevation crosses a level
  const CONTOUR_INTERVAL = 0.05;
  for (let y = 0; y < GH; y++) {
    for (let x = 0; x < GW - 1; x++) {
      const i  = y * GW + x;
      const h0 = terrain[i];
      const h1 = terrain[i + 1];
      const level0 = Math.floor(h0 / CONTOUR_INTERVAL);
      const level1 = Math.floor(h1 / CONTOUR_INTERVAL);
      if (level0 !== level1) {
        const p = i * 4;
        d[p]   = Math.min(255, d[p]   + 40);
        d[p+1] = Math.min(255, d[p+1] + 40);
        d[p+2] = Math.min(255, d[p+2] + 40);
      }
    }
  }
  // Vertical contours
  for (let y = 0; y < GH - 1; y++) {
    for (let x = 0; x < GW; x++) {
      const i  = y * GW + x;
      const h0 = terrain[i];
      const h1 = terrain[i + GW];
      const level0 = Math.floor(h0 / CONTOUR_INTERVAL);
      const level1 = Math.floor(h1 / CONTOUR_INTERVAL);
      if (level0 !== level1) {
        const p = i * 4;
        d[p]   = Math.min(255, d[p]   + 30);
        d[p+1] = Math.min(255, d[p+1] + 30);
        d[p+2] = Math.min(255, d[p+2] + 30);
      }
    }
  }
}

function renderWater(maxDepth) {
  const d = imgWater.data;
  const invMax = maxDepth > 0 ? 1 / maxDepth : 1;

  for (let i = 0; i < GW * GH; i++) {
    const w = water[i];
    const p = i * 4;
    if (w < MIN_WATER) {
      d[p+3] = 0;
      continue;
    }

    const depth = Math.min(1, w * invMax);
    const alpha = Math.min(240, 60 + depth * 190) | 0;

    if (showPressure) {
      // Pressure = water depth; map to blue→cyan gradient
      const pressure = Math.min(1, w * 8);
      d[p]   = lerp(20,  80,  pressure) | 0;
      d[p+1] = lerp(80,  200, pressure) | 0;
      d[p+2] = lerp(200, 255, pressure) | 0;
    } else if (showVelocity) {
      // Velocity magnitude: blue→white
      const vx = ((fluxR[i] || 0) - (fluxL[i] || 0));
      const vy = ((fluxD[i] || 0) - (fluxU[i] || 0));
      const spd = Math.min(1, Math.sqrt(vx*vx + vy*vy) * 3);
      d[p]   = lerp(20,  255, spd) | 0;
      d[p+1] = lerp(60,  255, spd) | 0;
      d[p+2] = lerp(180, 255, spd) | 0;
    } else {
      // Natural water: deep blue → shallow teal
      d[p]   = lerp(15, 60,  depth) | 0;
      d[p+1] = lerp(60, 140, depth) | 0;
      d[p+2] = lerp(170, 200, depth) | 0;
    }
    d[p+3] = alpha;
  }
}

function render(maxDepth) {
  const W = canvas.width, H = canvas.height - UI_H;

  renderTerrain();
  renderWater(maxDepth);

  // Blit terrain
  ctx.putImageData(imgTerrain, 0, 0);

  // Scale water imagedata onto canvas (CELL_PX upscaling)
  // Use offscreen canvas for pixel-perfect upscaling
  offCtx.putImageData(imgWater, 0, 0);
  ctx.imageSmoothingEnabled = false;
  ctx.drawImage(offCanvas, 0, 0, GW, GH, 0, 0, GW * CELL_PX, GH * CELL_PX);

  // Similarly blit terrain (upscaled)
  offCtx.putImageData(imgTerrain, 0, 0);
  ctx.clearRect(0, 0, W, H);
  ctx.drawImage(offCanvas, 0, 0, GW, GH, 0, 0, GW * CELL_PX, GH * CELL_PX);

  // Water on top
  offCtx.putImageData(imgWater, 0, 0);
  ctx.drawImage(offCanvas, 0, 0, GW, GH, 0, 0, GW * CELL_PX, GH * CELL_PX);

  // Source markers
  for (const src of sources) {
    const px = src.gx * CELL_PX + CELL_PX / 2;
    const py = src.gy * CELL_PX + CELL_PX / 2;
    ctx.beginPath();
    ctx.arc(px, py, 5, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(100,200,255,0.6)';
    ctx.fill();
    ctx.strokeStyle = 'rgba(150,230,255,0.9)';
    ctx.lineWidth = 1.5;
    ctx.stroke();
  }

  // Update stats
  document.getElementById('yr').textContent      = Math.round(year).toLocaleString();
  document.getElementById('max-depth').textContent = (maxDepth * 100).toFixed(1);
}

// ═══════════════════════════════════════════════════════════════════
// OFFSCREEN CANVAS  (for pixel upscaling)
// ═══════════════════════════════════════════════════════════════════
const offCanvas = document.createElement('canvas');
const offCtx    = offCanvas.getContext('2d');

// ═══════════════════════════════════════════════════════════════════
// MAIN LOOP
// ═══════════════════════════════════════════════════════════════════
let lastRender = 0;
const TARGET_FPS = 30;
const FRAME_MS   = 1000 / TARGET_FPS;

function loop(ts) {
  requestAnimationFrame(loop);
  if (!running || !terrain) return;
  if (ts - lastRender < FRAME_MS) return;
  lastRender = ts;

  const steps = Math.max(1, Math.round(document.getElementById('speed').value / 10));
  let maxDepth = 0;

  for (let s = 0; s < steps; s++) {
    maxDepth = stepHydraulic();
    stepErosion();
    year += YEARS_PER_STEP;
  }

  render(maxDepth);
}

// ═══════════════════════════════════════════════════════════════════
// UI INTERACTIONS
// ═══════════════════════════════════════════════════════════════════
function togglePlay() {
  running = !running;
  const btn = document.getElementById('btn-play');
  btn.textContent = running ? '⏸ Pause' : '▶ Play';
  btn.classList.toggle('active', running);
}

function toggleLayers() {
  showLayers = !showLayers;
  const btn = document.getElementById('btn-layers');
  btn.textContent = showLayers ? 'ON' : 'OFF';
  btn.classList.toggle('active', showLayers);
}

function togglePressure() {
  showPressure = !showPressure;
  showVelocity = false;
  document.getElementById('btn-pressure').textContent = showPressure ? 'ON' : 'OFF';
  document.getElementById('btn-pressure').classList.toggle('active', showPressure);
  document.getElementById('btn-velocity').textContent = 'OFF';
  document.getElementById('btn-velocity').classList.remove('active');
}

function toggleVelocity() {
  showVelocity = !showVelocity;
  showPressure = false;
  document.getElementById('btn-velocity').textContent = showVelocity ? 'ON' : 'OFF';
  document.getElementById('btn-velocity').classList.toggle('active', showVelocity);
  document.getElementById('btn-pressure').textContent = 'OFF';
  document.getElementById('btn-pressure').classList.remove('active');
}

canvas.addEventListener('click', (e) => {
  if (!terrain) return;
  const gx = (e.clientX / CELL_PX) | 0;
  const gy = (e.clientY / CELL_PX) | 0;
  if (gx < 0 || gx >= GW || gy < 0 || gy >= GH) return;

  if (e.shiftKey) {
    // Add obstruction: raise terrain
    for (let dy = -3; dy <= 3; dy++) {
      for (let dx = -3; dx <= 3; dx++) {
        const ix = gx + dx, iy = gy + dy;
        if (ix < 0 || ix >= GW || iy < 0 || iy >= GH) continue;
        const d = Math.sqrt(dx*dx+dy*dy);
        if (d <= 3) terrain[iy * GW + ix] = Math.min(0.95, terrain[iy * GW + ix] + 0.12 * (1 - d/3));
      }
    }
  } else {
    // Add water source
    sources.push({ gx, gy, rate: 0.06 });
  }
});

// ═══════════════════════════════════════════════════════════════════
// RESIZE
// ═══════════════════════════════════════════════════════════════════
function resize() {
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
  offCanvas.width  = Math.ceil(canvas.width  / CELL_PX);
  offCanvas.height = Math.ceil((canvas.height - UI_H) / CELL_PX);
  initSim();
}

window.addEventListener('resize', resize);
resize();
requestAnimationFrame(loop);
</script>
